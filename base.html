<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(-45deg, #141e30, #243b55, #1f4068, #1b1b2f);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .glass:hover {
            transform: translateY(-8px);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .navbar {
            background: rgba(0,0,0,0.4);
        }

        .nav-link {
            color: white !important;
            margin-left: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand text-white fw-bold" href="/">🚀 Job Detector</a>

    <div class="ms-auto">
        <a href="/" class="nav-link d-inline">Home</a>
        <a href="/predict_page" class="nav-link d-inline">Predict</a>
        <a href="/about" class="nav-link d-inline">About</a>
        <a href="/contact" class="nav-link d-inline">Contact</a>
    </div>
</nav>

<div class="container fade-in">
    {% block content %}{% endblock %}
</div>

</body>
</html>
