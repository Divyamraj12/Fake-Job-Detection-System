{% extends "base.html" %}

{% block content %}

<div class="glass text-center mt-5">

    <h2>🔎 Analyze Job Posting</h2>

    <form id="jobForm" action="/predict" method="post">

        <textarea name="job_desc" class="form-control mt-3" rows="6"
        placeholder="Paste job description here..."></textarea>

        <button class="btn btn-success mt-3 px-4">Analyze</button>

    </form>

    <div id="loading" style="display:none;" class="mt-3">
        ⏳ AI is analyzing...
    </div>

    {% if prediction %}
    <div class="mt-4 p-3 rounded 
        {% if 'Fake' in prediction %}bg-danger{% else %}bg-success{% endif %}">
        <h4>{{ prediction }}</h4>
    </div>
    {% endif %}

</div>

<script>
document.getElementById("jobForm").addEventListener("submit", function(){
    document.getElementById("loading").style.display = "block";
});
</script>

{% endblock %}
